<app-layout-shell title="Actividades de vinculación" subtitle="Registro y consulta de actividades del estudiante">
  <div class="page-card">
    <h3>Registrar actividad</h3>
    <form (ngSubmit)="guardar()" #actividadForm="ngForm">
      <div class="form-grid">
        <label>ID vinculación<input type="number" [(ngModel)]="form.id_vinculacion" name="id_vinculacion" required></label>
        <label>Fecha<input type="date" [(ngModel)]="form.fecha" name="fecha" required></label>
        <label>Hora inicio<input [(ngModel)]="form.hora_inicio" name="hora_inicio" required></label>
        <label>Hora fin<input [(ngModel)]="form.hora_fin" name="hora_fin" required></label>
        <label>Horas<input type="number" [(ngModel)]="form.horas_total" name="horas_total" required></label>
        <label>Descripción<input [(ngModel)]="form.actividades_realizadas" name="actividades_realizadas" required></label>
      </div>
      <button type="submit">Guardar actividad</button>
    </form>
    <p class="success" *ngIf="mensaje">{{ mensaje }}</p>
    <p class="error" *ngIf="error">{{ error }}</p>
  </div>

  <div class="page-card">
    <h3>Actividades registradas</h3>
    <table>
      <thead><tr><th>Fecha</th><th>Hora inicio</th><th>Hora fin</th><th>Horas</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr *ngFor="let item of actividades">
          <td>{{ item.fecha }}</td>
          <td>{{ item.hora_inicio }}</td>
          <td>{{ item.hora_fin }}</td>
          <td>{{ item.horas_total }}</td>
          <td>{{ item.actividades_realizadas }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</app-layout-shell>
